<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cáp sạc chính hãng - Phone Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-menu">
        <div class="menu-links">
            <a href="index.html">Trang chủ</a>
            <a href="op-lung.html">Ốp lưng</a>
            <a href="tai-nghe.html">Tai nghe</a>
            <a href="sac-du-phong.html">Sạc dự phòng</a>
            <a href="cap-sac.html" class="active">Cáp sạc</a>
            <a href="loa-bluetooth.html">Loa bluetooth</a>
        </div>
        <div class="cart" onclick="showCart()">
            🛒 Giỏ hàng: <span id="count">0</span>
        </div>
    </div>

    <div class="title-product">
        <h2>CÁP SẠC & BỘ SẠC NHANH</h2>
    </div>

    <section class="product-container">
        <!-- Sản phẩm 1 -->
        <div class="card">
            <div class="badge badge-discount">Giảm 5%</div>
            <div class="brand-name">Apple</div>
            <div class="card-media">
                <div class="product-img">
                    <img src="images/cap-apple-thunderbolt-4.webp" alt="Cáp Apple">
                </div>
                <div class="product-specs">
                    <div class="spec-item"><span class="icon">📏</span><p>1.8m</p></div>
                    <div class="spec-item"><span class="icon">⚡</span><p>40Gbps</p></div>
                </div>
            </div>
            <h3 class="product-title">Cáp Apple Thunderbolt 4 Pro (USB-C)</h3>
            <div class="product-price">
                <span class="price-new">4.350.000đ</span>
                <span class="price-old">4.590.000đ</span>
            </div>
            <div class="promotions">
                <div class="promo-box smember">Giảm thêm 50k cho Smember</div>
            </div>
            <button class="add-to-cart-btn" onclick="addCart('Cáp Thunderbolt 4 Pro', '4.350.000')">
                🛒 Thêm vào giỏ hàng
            </button>
        </div>

        <!-- Các card khác tương tự cho đủ 8 ô -->
    </section>

    <footer><p>© 2026 Shop Phụ Kiện Điện Thoại</p></footer>
    <script src="script.js"></script>
</body>
</html>
